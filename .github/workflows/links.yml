name: Link check

on:
  schedule:
    # Re-check links weekly — the ecosystem moves fast and links rot.
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run lychee link checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --max-concurrency 8
            --accept 200,201,204,206,301,302,307,308,401,403,429
            --exclude 'glassdoor\.com'
            --exclude 'teamblind\.com'
            --exclude 'levels\.fyi'
            --exclude 'reddit\.com'
            --exclude '(twitter|x)\.com'
            --exclude 'linkedin\.com'
            './**/*.md'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
